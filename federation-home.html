<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Federation Portal</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        /* ========================================
           2. CSS VARIABLES (THEME COLORS)
           ========================================
           These variables keep color consistency across the site.
           If you change a hex code here, it updates everywhere.
        */
        :root {
            --primary: #012A61;
            /* Deep Navy Blue */
            --secondary: #275A91;
            /* Medium Blue */
            --highlight: #FDC787;
            /* Gold/Yellow Highlight */
            --background: #A5C5CC;
            /* Light Blue-Grey Background */
            --accent: #977086;
            /* Muted Purple Accent */
        }

        /* Apply the font family and background color to the whole page */
        body {
            font-family: "Montserrat", sans-serif;
            background-color: var(--background);
        }
    </style>
</head>

<body class="min-h-screen overflow-x-hidden">

    <nav
        class="fixed top-0 left-0 w-full bg-[var(--background)]/80 backdrop-blur-md shadow-sm z-[100] border-b border-white/10">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

            <div class="text-2xl font-extrabold text-[var(--primary)] tracking-tight">Talent Tracker</div>

            <div class="hidden md:flex space-x-8 font-semibold text-black items-center">
                <a href="federation-home.html"
                    class="hover:text-[var(--primary)] transition-colors duration-200 text-[var(--primary)]">Home</a>
                <a href="dashboard.html"
                    class="hover:text-[var(--primary)] transition-colors duration-200">Dashboard</a>
                <a href="#" class="hover:text-[var(--primary)] transition-colors duration-200">Event</a>

                <div id="navUserArea" class="relative group">
                    <button id="navUserBtn"
                        class="px-6 py-2 rounded-full bg-[var(--secondary)] text-white hover:bg-[var(--primary)] transition-all duration-300 font-semibold shadow-lg hover:shadow-xl flex items-center gap-2 transform hover:-translate-y-0.5">
                        <span id="navBtnText">Loading...</span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="19 9l-7 7-7-7">
                            </path>
                        </svg>
                    </button>

                    <div id="navUserDropdown"
                        class="hidden absolute right-0 mt-3 w-56 bg-white shadow-2xl rounded-2xl text-black p-4 border border-gray-100 z-50 animate-fade overflow-hidden">
                        <div class="mb-4 pb-4 border-b border-gray-100">
                            <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Signed in as</p>
                            <p id="navUserEmail" class="text-sm font-semibold text-gray-800 break-words leading-tight">
                            </p>
                        </div>
                        <button id="logoutBtn"
                            class="w-full bg-red-50 text-red-600 py-3 rounded-xl hover:bg-red-100 transition-colors duration-200 text-sm font-bold flex items-center justify-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                                </path>
                            </svg>
                            Logout
                        </button>
                    </div>
                </div>
            </div>

            <!-- Mobile Hamburger Button -->
            <button id="mobileMenuButton"
                class="md:hidden text-[var(--primary)] focus:outline-none p-2 rounded-lg hover:bg-white/20 transition-colors"
                aria-label="Toggle Menu">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16m-7 6h7">
                    </path>
                </svg>
            </button>

            <!-- Mobile Menu Overlay -->
            <div id="mobileMenu" class="fixed inset-0 bg-[var(--background)] z-[101] flex flex-col items-center justify-center space-y-8 font-bold text-2xl text-[var(--primary)] 
                translate-x-full transition-transform duration-500 ease-in-out md:hidden">

                <!-- Decoration Circles -->
                <div class="absolute top-[-10%] left-[-10%] w-64 h-64 bg-[var(--primary)]/10 rounded-full blur-3xl">
                </div>
                <div
                    class="absolute bottom-[-10%] right-[-10%] w-64 h-64 bg-[var(--secondary)]/10 rounded-full blur-3xl">
                </div>

                <!-- Close Button -->
                <button id="mobileBackBtn"
                    class="absolute top-6 right-6 text-[var(--primary)] p-4 hover:rotate-90 transition-transform duration-300">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                            d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>

                <a href="federation-home.html" class="relative group py-2 text-[var(--primary)]">
                    <span>Home</span>
                    <span
                        class="absolute bottom-0 left-0 w-full h-1 bg-[var(--primary)] transition-all duration-300"></span>
                </a>
                <a href="dashboard.html" class="relative group py-2">
                    <span>Dashboard</span>
                    <span
                        class="absolute bottom-0 left-0 w-0 h-1 bg-[var(--primary)] transition-all duration-300 group-hover:w-full"></span>
                </a>
                <a href="#" class="relative group py-2">
                    <span>Event</span>
                    <span
                        class="absolute bottom-0 left-0 w-0 h-1 bg-[var(--primary)] transition-all duration-300 group-hover:w-full"></span>
                </a>

                <div class="w-full max-w-xs border-t border-[var(--primary)]/20 mt-4 pt-8 flex flex-col items-center">
                    <div class="mb-6 text-center">
                        <p class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-1">Federation</p>
                        <p id="mobileUserName" class="text-xl font-extrabold text-[var(--primary)]"></p>
                    </div>
                    <button id="mobileLogoutBtn"
                        class="w-full px-8 py-4 rounded-full bg-red-600 text-white hover:bg-red-700 transition-all shadow-xl active:scale-95 font-bold text-lg">
                        Logout
                    </button>
                </div>

                <div class="absolute bottom-10 text-sm text-[var(--primary)]/60 font-medium">
                    Talent Tracker © 2025
                </div>
            </div>
        </div>
    </nav>

    <section id="heroSection" class="pt-32 pb-16 max-w-7xl mx-auto px-6">
        <div class="grid grid-cols-1 lg:grid-cols-10 gap-12 items-center">

            <div
                class="lg:col-span-5 flex flex-col justify-center items-center text-center lg:text-left lg:items-start">

                <h1 class="text-4xl sm:text-5xl lg:text-6xl font-extrabold text-[var(--primary)] leading-tight mb-8">
                    Welcome, <span id="heroUserDisplay" class="text-white drop-shadow-sm italic">Federation</span> <br>
                    <span class="block mt-4 text-[var(--primary)]">Oversee Sports Development.</span>
                </h1>

                <p class="text-lg sm:text-xl text-black/80 font-medium mb-12 leading-relaxed max-w-xl">
                    Manage events, verify athletes, and monitor national performance with integrated tools.
                </p>

                <button id="viewAnalyticsBtn"
                    class="bg-[var(--secondary)] text-white px-12 py-5 rounded-full shadow-2xl hover:bg-[var(--primary)] transition-all duration-300 font-bold text-xl transform hover:scale-105 active:scale-95">
                    View Platform
                </button>
            </div>

            <div class="lg:col-span-5 flex justify-center lg:justify-end">
                <div class="relative group">
                    <div
                        class="absolute -inset-1 bg-gradient-to-r from-[var(--secondary)] to-[var(--primary)] rounded-[2.5rem] blur opacity-25 group-hover:opacity-50 transition duration-1000 group-hover:duration-200">
                    </div>
                    <img src="assets/Will’s Track Photo.jpeg"
                        class="relative w-full max-w-md lg:max-w-lg h-auto lg:h-[550px] object-cover rounded-[2.5rem] shadow-2xl transform transition duration-500 hover:scale-[1.02]"
                        alt="Federation" />
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-[var(--background)] text-black border-t border-gray-400 mt-12">
        <div class="max-w-7xl mx-auto py-8 text-center text-sm font-medium">
            © 2025 Talent Tracker. All Rights Reserved.
        </div>
    </footer>

    <script type="module" src="federation-home.js"></script>

</body>

</html>
